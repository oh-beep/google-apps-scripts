# =============================================================================
# clasp Push — Google Apps Scripts automatisch synchronisieren
# Bei Push auf main: Code wird nach script.google.com gepusht
# =============================================================================

name: Clasp Push

on:
  push:
    branches: [main]
    paths:
      - 'smart-email-router/**'
      - 'drive-aufraeumen/**'
      - 'smart-ablage/**'

jobs:
  push-scripts:
    name: Push zu Google Apps Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clasp installieren
        run: npm install -g @google/clasp

      - name: clasp Login einrichten
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Geänderte Scripts ermitteln und pushen
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)

          if echo "$CHANGED" | grep -q "^smart-email-router/"; then
            echo "📧 Smart E-Mail Router pushen..."
            cd smart-email-router
            clasp push -f
            cd ..
            echo "✅ Smart E-Mail Router aktualisiert"
          fi

          if echo "$CHANGED" | grep -q "^drive-aufraeumen/"; then
            echo "🗂️ Drive Aufräum-Script pushen..."
            cd drive-aufraeumen
            clasp push -f
            cd ..
            echo "✅ Drive Aufräum-Script aktualisiert"
          fi

          if echo "$CHANGED" | grep -q "^smart-ablage/"; then
            echo "📁 Smart Ablage System pushen..."
            cd smart-ablage
            clasp push -f
            cd ..
            echo "✅ Smart Ablage System aktualisiert"
          fi
